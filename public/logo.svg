<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 270">
  <defs>
    <linearGradient id="bg" x1="10%" y1="100%" x2="90%" y2="0%">
      <stop offset="0%" stop-color="#160548"/>
      <stop offset="45%" stop-color="#3c0fa2"/>
      <stop offset="100%" stop-color="#7228d8"/>
    </linearGradient>
    <!-- Clip everything to the rounded square shape -->
    <clipPath id="rr">
      <rect width="270" height="270" rx="54"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rr)">
    <!-- Background -->
    <rect width="270" height="270" fill="url(#bg)"/>

    <!-- K: upper arm (white quad from bar-top-right to top-right, narrowing to notch) -->
    <polygon points="102,44 228,44 162,130 102,130" fill="white"/>

    <!-- K: lower leg — proper parallelogram (equal-width diagonal strip) -->
    <polygon points="102,148 158,148 222,226 166,226" fill="white"/>

    <!-- Lightning bolt accent: covers lower portion of lower leg + slight right extension -->
    <polygon points="148,193 210,193 228,226 166,226" fill="#b8a0f8"/>

    <!-- K: left vertical bar — drawn last so it stays cleanly on top -->
    <rect x="46" y="44" width="56" height="182" fill="white"/>
  </g>
</svg>
